# Dedicated server package ships only standalone versioned scenarios in ./scenarios.
# Use --resume-save for resumed sessions and keep save_dir relative to the server root.
[server]
name=Claudius Dedicated
listen_address=0.0.0.0
port=29073
scenario=
resume_save=
max_players=8
dynamic_city_pool=0
autosave_interval_sec=300
save_dir=savegames
status_file=
advertise_lan=1
log_format=text

[security]
reconnect_timeout_ticks=5000
rate_limit_per_sec=30
queue_limit_per_peer=16
handshake_attempts_per_window=8
handshake_window_ms=10000
handshake_cooldown_ms=10000
pending_connections_per_ip=2
banlist_path=

[rules]
gameplay_change_allow_exporting_from_granaries=0
gameplay_change_default_game_speed=8
gameplay_change_storage_step_4=0
gameplay_change_caravans_move_off_road=0
gp_ch_storage_requests_respect_maintain=0
gameplay_market_range=0
gameplay_change_yearly_autosave=1
always_be_able_to_destroy_bridges=0
